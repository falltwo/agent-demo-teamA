# 合約／法遵助理 — 與 assets/custom.css :root 色票一致
# 主色 brand #1E3A8A（標題／側欄強調）、按鈕 primary #3B82F6、背景 #F8FAFC

[theme]
base = "light"
primaryColor = "#3B82F6"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#F1F5F9"
textColor = "#0F172A"
greenColor = "#22C55E"
yellowColor = "#EAB308"
redColor = "#EF4444"
orangeColor = "#F97316"
font = "sans serif"
headingFont = "sans serif"
codeFont = "monospace"

[theme.sidebar]
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#F1F5F9"
textColor = "#334155"

[browser]
gatherUsageStats = false
