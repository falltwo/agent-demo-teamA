name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python deps
        run: uv sync --extra dev
      - name: Pytest
        run: uv run pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Python (OpenAPI 匯出可選)
        run: uv sync --extra dev
      - name: Install web deps
        run: npm ci
        working-directory: web
      - name: OpenAPI 型別與 TypeScript 檢查
        run: npm run contract:check
        working-directory: web
      - name: Vite build
        run: npm run build
        working-directory: web

  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install Python deps
        run: uv sync --extra dev
      - name: Install web deps
        run: npm ci
        working-directory: web
      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps
        working-directory: web
      - name: E2E（health + chat mock）
        run: npm run test:e2e
        working-directory: web

  deploy:
    name: Deploy to DGX
    runs-on: ubuntu-latest
    needs: [secret-scan, pytest, web, playwright]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    concurrency:
      group: deploy-dgx
      cancel-in-progress: false

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --accept-routes

      - name: Wait for Tailscale peer path
        run: tailscale ping --c 3 ${{ secrets.DGX_TAILSCALE_IP }} || true

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Pin DGX host key
        run: |
          printf '%s %s\n' "${{ secrets.DGX_TAILSCALE_IP }}" "${{ secrets.DGX_HOST_KEY }}" >> ~/.ssh/known_hosts

      - name: Run deploy script on DGX
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            ${{ secrets.DGX_SSH_USER }}@${{ secrets.DGX_TAILSCALE_IP }} \
            "bash --login /home/falltwo/Code_space/Contract-compliance-agent/scripts/deploy_contract_agent.sh"
